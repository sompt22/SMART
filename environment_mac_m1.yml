name: smart_m1
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pip:
      # PyTorch with MPS support (Apple Silicon native)
      # Install from https://pytorch.org — do NOT use conda pytorch channel for M1
      - torch>=2.1.0
      - torchvision>=0.16.0   # deform_conv2d MPS support added in 0.16
      - torchaudio>=2.1.0

      # Core scientific
      - numpy==1.23.5
      - scipy==1.10.1
      - matplotlib==3.7.1

      # Computer vision
      - opencv-python-headless==4.8.0.74
      - Pillow==9.4.0

      # Build tools
      - Cython==0.29.34
      - setuptools>=67.0

      # MOT / tracking utilities
      - cython-bbox
      - motmetrics
      - lapx>=0.5.2

      # Deep learning utilities
      - numba==0.56.4
      - llvmlite==0.39.1
      - tensorboardX
      - fvcore==0.1.5.post20221221
      - pycocotools==2.0
      - progress==1.6
      - easydict==1.10
      - pyyaml==6.0
      - yacs==0.1.8

      # Data / IO
      - openpyxl
      - pyquaternion==0.9.9
      - pyrsistent

      # fvcore transitive dependencies
      - iopath==0.1.10
      - portalocker==2.7.0
      - tabulate==0.9.0
      - termcolor==2.2.0
      - packaging==23.0
